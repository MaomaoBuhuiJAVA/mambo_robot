<!DOCTYPE html>
<html class="dark" lang="zh-CN" style="color-scheme: dark;">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星宝 - 打字对话</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            surface: "#0b0c1f",
            primary: "#fdd835",
            secondary: "#efb1f9",
            outline: "#46465b",
            error: "#ff7351",
          },
          fontFamily: { body: ["Plus Jakarta Sans", "sans-serif"] }
        }
      }
    };
  </script>
  <style>
    body {
      background-color: #0b0c1f;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(253, 216, 53, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(239, 177, 249, 0.08) 0%, transparent 40%);
      font-family: "Plus Jakarta Sans", sans-serif;
      color: #e4e3fe;
    }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 420, "GRAD" 0, "opsz" 24; }
    #demo-details summary::-webkit-details-marker { display: none; }
    /* 原生 select 下拉在部分浏览器默认白底浅字，强制深色可读 */
    #sel-emotion {
      color: #e8e7ff;
      background-color: #16172a;
      border-color: rgba(255, 255, 255, 0.18);
    }
    #sel-emotion:focus {
      outline: none;
      border-color: rgba(253, 216, 53, 0.45);
      box-shadow: 0 0 0 2px rgba(253, 216, 53, 0.15);
    }
    #sel-emotion option {
      background-color: #1a1c30;
      color: #e8e7ff;
    }
  </style>
</head>
<body class="h-screen flex">
  <aside class="w-56 shrink-0 h-full px-4 py-6 bg-black/25 backdrop-blur-2xl border-r border-white/5">
    <div class="px-2 mb-8">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-primary/20 ring-2 ring-primary/25 flex items-center justify-center">
          <span class="material-symbols-outlined text-primary">star</span>
        </div>
        <div>
          <div class="font-black text-yellow-300 leading-tight">星宝</div>
          <div class="text-xs text-slate-400">打字对话</div>
        </div>
      </div>
    </div>
    <nav class="space-y-2">
      <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-300 hover:bg-white/5 transition" href="/dashboard">
        <span class="material-symbols-outlined text-[20px]">insights</span>
        <span class="text-sm font-semibold">控制台</span>
      </a>
      <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-yellow-400/10 text-yellow-300 border border-yellow-400/20" href="/chat">
        <span class="material-symbols-outlined text-[20px]">chat</span>
        <span class="text-sm font-semibold">打字对话</span>
      </a>
    </nav>
    <div class="mt-8 space-y-3 px-2">
      <label class="flex items-center justify-between gap-3 p-3 rounded-xl border border-white/10 bg-white/5">
        <div class="min-w-0">
          <div class="text-sm font-bold">复述模式</div>
          <div class="text-xs text-slate-400">输入什么，星宝就说什么</div>
        </div>
        <input id="toggle-echo" type="checkbox" class="h-5 w-5 rounded accent-yellow-400" />
      </label>

      <label class="flex items-center justify-between gap-3 p-3 rounded-xl border border-white/10 bg-white/5">
        <div class="min-w-0">
          <div class="text-sm font-bold">语音播报</div>
          <div class="text-xs text-slate-400">让星宝把回复说出来</div>
        </div>
        <input id="toggle-speak" type="checkbox" class="h-5 w-5 rounded accent-yellow-400" checked />
      </label>

      <div class="p-3 rounded-xl border border-white/10 bg-white/5 space-y-2">
        <div class="text-sm font-bold">表情情绪</div>
        <div class="text-xs text-slate-400">锁定后控制台/App 里「识别情绪」与眼睛都保持此项，不再被摄像头覆盖；选「自动」恢复视觉识别。</div>
        <select id="sel-emotion" class="w-full rounded-lg px-2 py-2 text-sm">
          <option value="auto">自动（大模型）</option>
          <option value="ZhongXing">中性 ZhongXing</option>
          <option value="KaiXin">开心 KaiXin</option>
          <option value="JingYa">惊讶 JingYa</option>
          <option value="NanGuo">难过 NanGuo</option>
          <option value="ShengQi">生气 ShengQi</option>
          <option value="KongJu">害怕 KongJu</option>
        </select>
      </div>
    </div>
  </aside>

  <main class="flex-1 h-full flex flex-col min-w-0">
    <header class="shrink-0 px-6 py-4 border-b border-white/5 bg-black/10">
      <div class="flex items-center justify-between gap-4">
        <div class="min-w-0">
          <div class="text-lg font-black text-yellow-300">打字对话</div>
          <div class="text-xs text-slate-400">演示模式：echo + <code class="text-slate-500">pretend_user</code> 记录对用户的一轮</div>
        </div>
        <button id="btn-clear" class="px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 transition text-sm font-semibold">
          清空本页
        </button>
      </div>
    </header>

    <details id="demo-details" class="shrink-0 border-b border-white/5 bg-black/15" open>
      <summary class="px-6 py-3 cursor-pointer list-none flex items-center justify-between gap-3 text-sm font-bold text-secondary hover:bg-white/5 transition">
        <span class="flex items-center gap-2 min-w-0">
          <span class="material-symbols-outlined text-lg shrink-0">smart_display</span>
          <span class="truncate">演示模式 · 预设对话流程，点一下播一步</span>
        </span>
        <span id="demo-step-badge" class="text-xs font-mono text-slate-500 shrink-0">步骤 0/0</span>
      </summary>
      <div class="px-6 pb-4 space-y-3 text-sm border-t border-white/5">
        <p class="text-xs text-slate-500 pt-3">每行：用户台词（气泡） + 星宝要说的（复述 TTS，不调大模型）。侧栏请打开「语音播报」。</p>
        <div id="demo-rows" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
        <div class="flex flex-wrap gap-2">
          <button type="button" id="demo-add-row" class="px-3 py-1.5 rounded-lg border border-white/15 bg-white/5 hover:bg-white/10 text-xs font-semibold">加一行</button>
          <button type="button" id="demo-del-row" class="px-3 py-1.5 rounded-lg border border-white/15 bg-white/5 hover:bg-white/10 text-xs font-semibold">删末行</button>
          <button type="button" id="demo-save" class="px-3 py-1.5 rounded-lg border border-secondary/30 bg-secondary/10 text-secondary text-xs font-semibold">保存到本机</button>
          <button type="button" id="demo-reset-idx" class="px-3 py-1.5 rounded-lg border border-white/15 bg-white/5 hover:bg-white/10 text-xs font-semibold">从第一步重来</button>
        </div>
        <button type="button" id="demo-next" class="w-full py-3 rounded-xl bg-secondary/25 border border-secondary/40 text-secondary font-black hover:bg-secondary/35 transition text-sm">
          下一步 — 显示用户这句并播报星宝
        </button>
      </div>
    </details>

    <section class="flex-1 min-h-0 overflow-y-auto px-6 py-4" id="chat-log"></section>

    <footer class="p-4 border-t border-white/5 bg-black/10">
      <div class="mb-3">
        <div class="text-xs text-slate-500 mb-2">常用语句（点击发送）</div>
        <div id="quick-phrases" class="flex flex-wrap gap-2"></div>
      </div>
      <form id="form-send" class="flex items-end gap-3">
        <textarea id="input-text" rows="2" class="flex-1 resize-none rounded-2xl bg-white/5 border border-white/10 focus:border-yellow-400/40 focus:ring-0 text-slate-100 placeholder:text-slate-500 p-4"
          placeholder="在这里输入…（Enter 发送，Shift+Enter 换行）"></textarea>
        <button id="btn-send" type="submit" class="px-5 py-3 rounded-2xl bg-yellow-400 text-[#5b4b00] font-black hover:brightness-105 active:scale-[0.98] transition">
          发送
        </button>
      </form>
      <div id="hint" class="mt-2 text-xs text-slate-500"></div>
    </footer>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const log = $("chat-log");
    const input = $("input-text");
    const echo = $("toggle-echo");
    const speak = $("toggle-speak");
    const hint = $("hint");
    const EMOTION_STORAGE = "mambo_chat_emotion_sel";

    function emotionPayload() {
      const sel = $("sel-emotion");
      const v = sel ? String(sel.value || "auto").trim() : "auto";
      return { emotion: v || "auto" };
    }

    async function pingEmotionOnly() {
      try {
        await fetch("/api/v1/dialog/text", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(
            Object.assign({ text: "", mode: "echo", speak: false }, emotionPayload()),
          ),
        });
      } catch (_) {}
    }

    function initEmotionSelect() {
      const sel = $("sel-emotion");
      if (!sel) return;
      try {
        const s = localStorage.getItem(EMOTION_STORAGE);
        if (s && Array.from(sel.options).some((o) => o.value === s)) sel.value = s;
      } catch (_) {}
      sel.addEventListener("change", () => {
        try {
          localStorage.setItem(EMOTION_STORAGE, sel.value);
        } catch (_) {}
        pingEmotionOnly();
      });
    }

    function addBubble(role, text) {
      const wrap = document.createElement("div");
      wrap.className = "mb-3 flex " + (role === "user" ? "justify-end" : "justify-start");
      const b = document.createElement("div");
      b.className = "max-w-[min(680px,85%)] whitespace-pre-wrap rounded-2xl px-4 py-3 border " +
        (role === "user"
          ? "bg-yellow-400/10 border-yellow-400/20 text-slate-100"
          : "bg-white/5 border-white/10 text-slate-200");
      b.textContent = text;
      wrap.appendChild(b);
      log.appendChild(wrap);
      log.scrollTop = log.scrollHeight;
    }

    async function sendText(text) {
      const mode = echo.checked ? "echo" : "chat";
      const body = Object.assign({ text, mode, speak: !!speak.checked }, emotionPayload());
      const res = await fetch("/api/v1/dialog/text", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(() => ({}));
      if (!data || data.ok !== true) {
        const err = (data && (data.error || data.message)) ? (data.error || data.message) : ("http_" + res.status);
        addBubble("assistant", "出错了：" + err);
        return;
      }
      addBubble("assistant", data.reply || "…");
    }

    const DEMO_STORAGE = "mambo_chat_demo_flow";
    const demoRowsEl = $("demo-rows");
    const demoBadge = $("demo-step-badge");
    let demoStepIdx = 0;

    function collectDemoSteps() {
      const rows = demoRowsEl.querySelectorAll(".demo-row");
      const steps = [];
      rows.forEach((row) => {
        const u = (row.querySelector(".demo-user")?.value || "").trim();
        const a = (row.querySelector(".demo-assistant")?.value || "").trim();
        if (u || a) steps.push({ user: u, assistant: a });
      });
      return steps;
    }

    function renderDemoBadge() {
      const n = collectDemoSteps().length;
      if (n === 0) demoBadge.textContent = "未配置";
      else if (demoStepIdx >= n) demoBadge.textContent = "已播完 " + n + " 步";
      else demoBadge.textContent = "下一拍 " + (demoStepIdx + 1) + "/" + n;
    }

    function addDemoRow(user, assistant) {
      const row = document.createElement("div");
      row.className = "demo-row grid grid-cols-1 sm:grid-cols-2 gap-2";
      row.innerHTML =
        '<input type="text" class="demo-user rounded-lg bg-white/5 border border-white/10 px-3 py-2 text-slate-100 text-sm placeholder:text-slate-600" placeholder="用户说什么" />' +
        '<input type="text" class="demo-assistant rounded-lg bg-white/5 border border-secondary/20 px-3 py-2 text-slate-100 text-sm placeholder:text-slate-600" placeholder="星宝回复（播报）" />';
      row.querySelector(".demo-user").value = user || "";
      row.querySelector(".demo-assistant").value = assistant || "";
      demoRowsEl.appendChild(row);
      renderDemoBadge();
    }

    function saveDemoToStorage() {
      const steps = collectDemoSteps();
      try {
        localStorage.setItem(DEMO_STORAGE, JSON.stringify(steps));
      } catch (_) {}
    }

    function loadDemoFromStorage() {
      demoRowsEl.innerHTML = "";
      let steps = [];
      try {
        const raw = localStorage.getItem(DEMO_STORAGE);
        if (raw) steps = JSON.parse(raw);
      } catch (_) {}
      if (!Array.isArray(steps) || steps.length === 0) {
        addDemoRow("你好呀", "你好，我是星宝！");
        addDemoRow("你叫什么", "我叫星宝，是你的小陪伴机器人。");
        addDemoRow("", "今天我们一起玩一会儿好吗？");
      } else {
        steps.forEach((s) => addDemoRow(s.user || "", s.assistant || ""));
      }
      demoStepIdx = 0;
      renderDemoBadge();
    }

    async function playDemoNext() {
      const steps = collectDemoSteps();
      if (steps.length === 0) {
        hint.textContent = "请先填写至少一行的星宝回复";
        return;
      }
      if (demoStepIdx >= steps.length) {
        hint.textContent = "流程已结束，点「从第一步重来」可再演一遍";
        return;
      }
      const s = steps[demoStepIdx];
      if (!(s.assistant || "").trim()) {
        hint.textContent = "当前步「星宝回复」为空，请填写后再点";
        return;
      }
      const userShown = (s.user || "").trim() || "（演示 · 用户）";
      addBubble("user", userShown);
      hint.textContent = "播报中…";
      try {
        const res = await fetch("/api/v1/dialog/text", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(
            Object.assign(
              {
                text: (s.assistant || "").trim(),
                mode: "echo",
                speak: !!speak.checked,
                pretend_user: userShown,
              },
              emotionPayload(),
            ),
          ),
        });
        const data = await res.json().catch(() => ({}));
        if (!data || data.ok !== true) {
          const err = (data && (data.error || data.message)) ? (data.error || data.message) : ("http_" + res.status);
          addBubble("assistant", "出错了：" + err);
          return;
        }
        addBubble("assistant", data.reply || "…");
        demoStepIdx++;
        renderDemoBadge();
        hint.textContent = demoStepIdx >= steps.length ? "本流程已播完" : "";
      } finally {
        if (hint.textContent === "播报中…") hint.textContent = "";
      }
    }

    $("demo-add-row").addEventListener("click", () => {
      addDemoRow("", "");
      saveDemoToStorage();
    });
    $("demo-del-row").addEventListener("click", () => {
      const rows = demoRowsEl.querySelectorAll(".demo-row");
      if (rows.length) rows[rows.length - 1].remove();
      demoStepIdx = 0;
      renderDemoBadge();
      saveDemoToStorage();
    });
    $("demo-save").addEventListener("click", () => {
      saveDemoToStorage();
      hint.textContent = "已保存";
      setTimeout(() => {
        if (hint.textContent === "已保存") hint.textContent = "";
      }, 1500);
    });
    $("demo-reset-idx").addEventListener("click", () => {
      demoStepIdx = 0;
      renderDemoBadge();
      hint.textContent = "";
    });
    $("demo-next").addEventListener("click", () => playDemoNext());
    demoRowsEl.addEventListener("input", () => {
      renderDemoBadge();
    });

    const QUICK_PHRASES = ["你好呀", "好", "可以", "我想吃果果", "玩游戏", "你叫什么"];
    const quickBox = $("quick-phrases");
    QUICK_PHRASES.forEach((phrase) => {
      const b = document.createElement("button");
      b.type = "button";
      b.textContent = phrase;
      b.className =
        "px-3 py-1.5 rounded-full text-sm border border-white/15 bg-white/5 text-slate-200 hover:bg-yellow-400/15 hover:border-yellow-400/30 transition";
      b.addEventListener("click", async () => {
        addBubble("user", phrase);
        hint.textContent = "发送中…";
        try {
          await sendText(phrase);
        } finally {
          hint.textContent = "";
        }
      });
      quickBox.appendChild(b);
    });

    $("form-send").addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = (input.value || "").trim();
      if (!text) return;
      input.value = "";
      addBubble("user", text);
      hint.textContent = "发送中…";
      try {
        await sendText(text);
      } finally {
        hint.textContent = "";
      }
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        $("btn-send").click();
      }
    });

    $("btn-clear").addEventListener("click", () => {
      log.innerHTML = "";
      hint.textContent = "";
      input.focus();
    });

    loadDemoFromStorage();
    initEmotionSelect();
    pingEmotionOnly();

    // welcome
    addBubble("assistant", "你好呀，我是星宝。你可以直接打字和我聊天；打开“复述模式”后，我会把你输入的内容原样说出来。侧栏可选「表情情绪」锁定眼睛表情，或选自动交给大模型。展开「演示模式」可编排固定对话流程。");

  </script>
</body>
</html>
